{% extends "layout.html" %}

{% block title %}My Events - Bronx Science Olympiad{% endblock %}

{% block content %}
<div class="hero" style="height: 30vh; background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('/static/images/events-bg.jpg');">
    <div class="hero-content">
        <h1>My Events</h1>
        <p>Manage your Science Olympiad events</p>
    </div>
</div>

<section class="section">
    <div class="container">
        <div class="section-title">
            <h2>My Events</h2>
        </div>
        <div class="section-content">
            <div class="user-events">
                <div class="event-list-header">
                    <div class="filter-options">
                        <select id="filterEventType">
                            <option value="all">All Events</option>
                            <option value="biology">Biology</option>
                            <option value="chemistry">Chemistry</option>
                            <option value="earth">Earth Science</option>
                            <option value="physics">Math & Physics</option>
                            <option value="build">Build</option>
                        </select>
                        <div class="search-box">
                            <input type="text" id="eventSearch" placeholder="Search events...">
                            <i class="fas fa-search"></i>
                        </div>
                    </div>
                </div>
                
                <div id="eventsContainer" class="events-container">
                    <!-- Events will be loaded here from Firebase -->
                    <div class="loading-indicator">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading your events...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_css %}
<style>
    .user-events {
        background-color: white;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        padding: 30px;
    }
    
    .event-list-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }
    
    .filter-options {
        display: flex;
        gap: 15px;
        align-items: center;
    }
    
    .filter-options select {
        padding: 10px 15px;
        border-radius: 8px;
        border: 1px solid #ddd;
        font-family: inherit;
        background-color: white;
    }
    
    .search-box {
        position: relative;
    }
    
    .search-box input {
        padding: 10px 15px;
        padding-right: 40px;
        border-radius: 8px;
        border: 1px solid #ddd;
        width: 250px;
    }
    
    .search-box i {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #777;
    }
    
    .events-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }
    
    .event-card {
        background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        border-radius: 10px;
        padding: 20px;
        transition: all 0.3s;
        border-left: 5px solid var(--accent-color);
    }
    
    .event-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }
    
    .event-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }
    
    .event-title {
        font-size: 1.2rem;
        color: var(--primary-color);
        font-weight: 600;
    }
    
    .event-category {
        background-color: var(--accent-color);
        color: white;
        padding: 4px 10px;
        border-radius: 15px;
        font-size: 0.8rem;
    }
    
    .event-details {
        margin-bottom: 15px;
    }
    
    .event-description {
        color: #555;
        font-size: 0.95rem;
        line-height: 1.5;
        margin-bottom: 15px;
    }
    
    .event-progress {
        margin-top: 15px;
    }
    
    .progress-label {
        display: flex;
        justify-content: space-between;
        margin-bottom: 5px;
        font-size: 0.9rem;
    }
    
    .progress-bar {
        height: 8px;
        background-color: #eee;
        border-radius: 4px;
        overflow: hidden;
    }
    
    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent-color), var(--secondary-color));
        border-radius: 4px;
    }
    
    .loading-indicator {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
        grid-column: 1 / -1;
        color: #777;
    }
    
    .loading-indicator i {
        font-size: 2rem;
        margin-bottom: 15px;
        color: var(--accent-color);
    }
    
    @media (max-width: 768px) {
        .event-list-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
        }
        
        .filter-options {
            width: 100%;
            flex-direction: column;
            align-items: flex-start;
        }
        
        .search-box, .filter-options select {
            width: 100%;
        }
        
        .search-box input {
            width: 100%;
        }
        
        .events-container {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Check if user is logged in
        const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = '{{ url_for("login") }}';
            return;
        }
        
        const eventsContainer = document.getElementById('eventsContainer');
        const filterSelect = document.getElementById('filterEventType');
        const searchInput = document.getElementById('eventSearch');
        
        // Load user events from Firebase
        function loadUserEvents() {
            // Clear previous content
            eventsContainer.innerHTML = `
                <div class="loading-indicator">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading your events...</p>
                </div>
            `;
            
            // Fetch user's events from Firebase
            fetch(`/api/Members/${currentUser.id}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to load user data');
                    }
                    return response.json();
                })
                .then(data => {
                    // Get the member data
                    const memberData = Object.values(data)[0];
                    const userEvents = memberData.events || [];
                    
                    if (userEvents.length === 0) {
                        eventsContainer.innerHTML = `
                            <div class="no-events-message" style="grid-column: 1 / -1; text-align: center; padding: 40px;">
                                <i class="fas fa-calendar-times" style="font-size: 3rem; color: #ddd; margin-bottom: 15px;"></i>
                                <h3>No Events Found</h3>
                                <p>You haven't been assigned to any events yet.</p>
                            </div>
                        `;
                        return;
                    }
                    
                    // For demo, create mock event data based on the user's selected events
                    const mockEvents = userEvents.map(eventName => {
                        // Determine category based on event name
                        let category;
                        if (['Anatomy and Physiology', 'Disease Detectives', 'Ecology', 'Entomology', 'Microbe Mission'].includes(eventName)) {
                            category = 'biology';
                        } else if (['Chem Lab', 'Forensics', 'Materials Science'].includes(eventName)) {
                            category = 'chemistry';
                        } else if (['Astronomy', 'Dynamic Planet', 'Fossils', 'Geologic Mapping'].includes(eventName)) {
                            category = 'earth';
                        } else if (['Codebusters', 'Experimental Design', 'Optics'].includes(eventName)) {
                            category = 'physics';
                        } else {
                            category = 'build';
                        }
                        
                        // Random progress for demo
                        const progress = Math.floor(Math.random() * 100);
                        
                        return {
                            name: eventName,
                            category: category,
                            description: `Study materials and resources for ${eventName}.`,
                            progress: progress,
                            lastUpdated: new Date().toLocaleDateString()
                        };
                    });
                    
                    // Render events
                    renderEvents(mockEvents);
                    
                    // Set up filtering and search
                    setupFiltering(mockEvents);
                })
                .catch(error => {
                    console.error('Error loading events:', error);
                    eventsContainer.innerHTML = `
                        <div class="error-message" style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #e74c3c;">
                            <i class="fas fa-exclamation-circle" style="font-size: 3rem; margin-bottom: 15px;"></i>
                            <h3>Error Loading Events</h3>
                            <p>${error.message}</p>
                        </div>
                    `;
                });
        }
        
        // Render events to the container
        function renderEvents(events) {
            eventsContainer.innerHTML = '';
            
            if (events.length === 0) {
                eventsContainer.innerHTML = `
                    <div class="no-events-message" style="grid-column: 1 / -1; text-align: center; padding: 40px;">
                        <i class="fas fa-filter" style="font-size: 3rem; color: #ddd; margin-bottom: 15px;"></i>
                        <h3>No Matching Events</h3>
                        <p>Try adjusting your filters or search terms.</p>
                    </div>
                `;
                return;
            }
            
            events.forEach(event => {
                const categoryLabel = getCategoryLabel(event.category);
                const eventCard = document.createElement('div');
                eventCard.className = 'event-card';
                eventCard.innerHTML = `
                    <div class="event-header">
                        <h3 class="event-title">${event.name}</h3>
                        <span class="event-category">${categoryLabel}</span>
                    </div>
                    <div class="event-details">
                        <p class="event-description">${event.description}</p>
                        <div class="event-progress">
                            <div class="progress-label">
                                <span>Progress</span>
                                <span>${event.progress}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${event.progress}%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="event-footer">
                        <small>Last updated: ${event.lastUpdated}</small>
                    </div>
                `;
                eventsContainer.appendChild(eventCard);
            });
        }
        
        // Set up filtering and search functionality
        function setupFiltering(allEvents) {
            filterSelect.addEventListener('change', applyFilters);
            searchInput.addEventListener('input', applyFilters);
            
            function applyFilters() {
                const filterValue = filterSelect.value;
                const searchValue = searchInput.value.toLowerCase();
                
                const filteredEvents = allEvents.filter(event => {
                    // Apply category filter
                    if (filterValue !== 'all' && event.category !== filterValue) {
                        return false;
                    }
                    
                    // Apply search filter
                    if (searchValue && !event.name.toLowerCase().includes(searchValue)) {
                        return false;
                    }
                    
                    return true;
                });
                
                renderEvents(filteredEvents);
            }
        }
        
        // Helper function to get human-readable category labels
        function getCategoryLabel(category) {
            switch (category) {
                case 'biology': return 'Biology';
                case 'chemistry': return 'Chemistry';
                case 'earth': return 'Earth Science';
                case 'physics': return 'Math & Physics';
                case 'build': return 'Build';
                default: return 'General';
            }
        }
        
        // Load events when page loads
        loadUserEvents();
    });
</script>
{% endblock %}
