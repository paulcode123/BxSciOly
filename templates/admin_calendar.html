{% extends 'layout.html' %}

{% block title %}Calendar Management - Admin{% endblock %}

{% block content %}
<div class="admin-page">
    <!-- Navigation Header -->
    <div class="admin-nav">
        <div class="nav-left">
            <a href="/admin/dashboard" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
            <h1><i class="fas fa-calendar-alt"></i> Calendar Management</h1>
        </div>
        <div class="nav-right">
            <button class="btn-primary" onclick="createCalendarEvent()">
                <i class="fas fa-plus"></i> Create Event
            </button>
            <button class="btn-secondary" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content-container">
        <div class="panel">
            <div class="panel-header">
                <h2>Calendar Events</h2>
                <div class="panel-actions">
                    <div class="search-container">
                        <input type="text" id="eventSearch" placeholder="Search events...">
                        <i class="fas fa-search"></i>
                    </div>
                    <select id="typeFilter">
                        <option value="">All Types</option>
                        <option value="meeting">Meeting</option>
                        <option value="competition">Competition</option>
                        <option value="deadline">Deadline</option>
                        <option value="workshop">Workshop</option>
                        <option value="practice">Practice</option>
                    </select>
                </div>
            </div>
            <div class="panel-body">
                <div id="calendarEventsList">
                    <!-- Calendar events will be loaded here -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Create Event Modal -->
<div id="createEventModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Create Calendar Event</h3>
            <button class="close-btn" onclick="closeModal('createEventModal')">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <form id="createEventForm">
                <div class="form-group">
                    <label>Event Title:</label>
                    <input type="text" name="title" required>
                </div>
                <div class="form-group">
                    <label>Description:</label>
                    <textarea name="description" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Date:</label>
                        <input type="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label>Start Time:</label>
                        <input type="time" name="startTime">
                    </div>
                    <div class="form-group">
                        <label>End Time:</label>
                        <input type="time" name="endTime">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Event Type:</label>
                        <select name="eventType" required>
                            <option value="meeting">Meeting</option>
                            <option value="competition">Competition</option>
                            <option value="deadline">Deadline</option>
                            <option value="workshop">Workshop</option>
                            <option value="practice">Practice</option>
                            <option value="celebration">Celebration</option>
                            <option value="no-school">No School</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Location:</label>
                        <input type="text" name="location">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal('createEventModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Create Event</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let allEvents = [];

    document.addEventListener('DOMContentLoaded', function() {
        loadCalendarEvents();
    });

    async function loadCalendarEvents() {
        try {
            const adminId = sessionStorage.getItem('adminId');
            const response = await fetch('/api/admin/calendar-events', {
                headers: {
                    'X-Admin-ID': adminId ? adminId : ''
                }
            });
            if (response.status === 401) {
                window.location.href = '/admin/login';
                return;
            }
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            allEvents = await response.json();
            displayCalendarEvents();
        } catch (error) {
            console.error('Error loading calendar events:', error);
            allEvents = []; // Prevents forEach error
            displayCalendarEvents();
        }
    }

    function displayCalendarEvents() {
        const container = document.getElementById('calendarEventsList');
        container.innerHTML = '';

        if (!Array.isArray(allEvents) || allEvents.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <p>No calendar events found.</p>
                </div>
            `;
            return;
        }

        allEvents.forEach(event => {
            const eventItem = document.createElement('div');
            eventItem.className = 'event-item';
            eventItem.innerHTML = `
                <div class="event-info">
                    <h4>${event.title}</h4>
                    <p>${event.description || 'No description'}</p>
                    <p><strong>Date:</strong> ${new Date(event.date).toLocaleDateString()}</p>
                    <p><strong>Type:</strong> ${event.eventType}</p>
                    ${event.location ? `<p><strong>Location:</strong> ${event.location}</p>` : ''}
                </div>
                <div class="event-actions">
                    <button class="edit-btn" onclick="editEvent('${event.id}')">
                        <i class="fas fa-edit"></i> Edit
                    </button>
                    <button class="delete-btn" onclick="deleteEvent('${event.id}')">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            `;
            container.appendChild(eventItem);
        });
    }

    // Handle form submission (CREATE or EDIT)
    let editingEventId = null;
    document.getElementById('createEventForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        const eventData = {
            title: formData.get('title'),
            description: formData.get('description'),
            date: formData.get('date'),
            startTime: formData.get('startTime'),
            endTime: formData.get('endTime'),
            eventType: formData.get('eventType'),
            location: formData.get('location'),
            isActive: true
        };
        const adminId = sessionStorage.getItem('adminId');
        try {
            let url = '/api/admin/calendar-events';
            let method = 'POST';
            if (editingEventId) {
                url = `/api/admin/calendar-events/${editingEventId}`;
                method = 'PATCH';
            }
            const response = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'X-Admin-ID': adminId ? adminId : ''
                },
                body: JSON.stringify(eventData)
            });
            if (response.ok) {
                closeModal('createEventModal');
                loadCalendarEvents();
                this.reset();
                editingEventId = null;
            } else {
                alert('Error saving event');
            }
        } catch (error) {
            console.error('Error saving event:', error);
            alert('Error saving event');
        }
    });

    function editEvent(eventId) {
        const event = allEvents.find(ev => ev.id === eventId);
        if (!event) return;
        editingEventId = eventId;
        // Pre-fill form
        const form = document.getElementById('createEventForm');
        form.elements['title'].value = event.title || '';
        form.elements['description'].value = event.description || '';
        form.elements['date'].value = event.date ? new Date(event.date).toISOString().slice(0,10) : '';
        form.elements['startTime'].value = event.startTime || '';
        form.elements['endTime'].value = event.endTime || '';
        form.elements['eventType'].value = event.eventType || '';
        form.elements['location'].value = event.location || '';
        document.getElementById('createEventModal').style.display = 'block';
    }

    function deleteEvent(eventId) {
        if (!confirm('Are you sure you want to delete this event?')) return;
        const adminId = sessionStorage.getItem('adminId');
        fetch(`/api/admin/calendar-events/${eventId}`, {
            method: 'DELETE',
            headers: {
                'X-Admin-ID': adminId ? adminId : ''
            }
        })
        .then(res => {
            if (res.ok) {
                loadCalendarEvents();
            } else {
                alert('Error deleting event');
            }
        })
        .catch(err => {
            console.error('Error deleting event:', err);
            alert('Error deleting event');
        });
    }

    // When opening the modal for a new event, clear editing state
    function createCalendarEvent() {
        editingEventId = null;
        document.getElementById('createEventForm').reset();
        document.getElementById('createEventModal').style.display = 'block';
    }

    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }

    function logout() {
        if (confirm('Are you sure you want to logout?')) {
            sessionStorage.removeItem('admin_token');
            window.location.href = '/admin/login';
        }
    }

    // Close modal when clicking outside
    window.onclick = function(event) {
        if (event.target.classList.contains('modal')) {
            event.target.style.display = 'none';
        }
    }
</script>
{% endblock %}
