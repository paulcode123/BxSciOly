{% extends "layout.html" %}

{% block title %}Interest Meeting Check-in{% endblock %}

{% block content %}
<section class="section" style="padding:60px 0;">
    <div class="container" style="max-width:720px;">
        <h2 style="text-align:center;">Interest Meeting Check-in</h2>
        <div id="status" style="text-align:center; margin:16px 0; color:#666;">Verifying access…</div>

        <form id="checkinForm" style="display:none;">
            <div class="form-group" style="margin-bottom:12px;">
                <label for="name">Full Name</label>
                <input id="name" type="text" required style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd;">
            </div>
            <div class="form-group" style="margin-bottom:12px;">
                <label for="grade">Grade</label>
                <select id="grade" required style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd;">
                    <option value="">Select grade…</option>
                    <option>9</option>
                    <option>10</option>
                    <option>11</option>
                    <option>12</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:16px;">
                <label for="email">Email</label>
                <input id="email" type="email" required style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd;">
            </div>
            <button class="btn btn-primary" type="submit">Submit Attendance</button>
        </form>

        <div id="result" style="display:none; text-align:center; margin-top:16px;"></div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    async function verifyToken(token) {
        const res = await fetch('/api/interest/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token })
        });
        return res;
    }

    function cleanUrl() {
        const { protocol, host, pathname } = window.location;
        const newUrl = protocol + '//' + host + pathname;
        window.history.replaceState({}, document.title, newUrl);
    }

    (async function init() {
        const status = document.getElementById('status');
        const form = document.getElementById('checkinForm');
        const result = document.getElementById('result');

        // If duplicate cookie is already present, short-circuit UI
        if (document.cookie.split('; ').find(row => row.startsWith('interest_submitted='))) {
            status.textContent = '';
            form.style.display = 'none';
            result.style.display = 'block';
            result.textContent = 'You have already submitted attendance on this device.';
            cleanUrl();
            return;
        }

        const token = getQueryParam('token');
        if (!token) {
            status.textContent = 'Missing or invalid access. Please scan the QR again.';
            return;
        }

        try {
            const res = await verifyToken(token);
            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                status.textContent = data.error === 'expired' ? 'Link expired. Please scan the fresh QR.' : 'Invalid link.';
                return;
            }
            // Token verified: clean URL immediately to discourage sharing
            cleanUrl();
            status.textContent = '';
            form.style.display = 'block';
        } catch (e) {
            status.textContent = 'Network error. Please try again.';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const grade = document.getElementById('grade').value.trim();
            const email = document.getElementById('email').value.trim();

            const res = await fetch('/api/interest/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, grade, email })
            });
            const data = await res.json().catch(() => ({}));
            if (res.ok && data.ok) {
                form.style.display = 'none';
                result.style.display = 'block';
                result.textContent = 'Thanks! Your attendance has been recorded.';
            } else if (data.error === 'already_submitted') {
                form.style.display = 'none';
                result.style.display = 'block';
                result.textContent = 'You have already submitted attendance on this device.';
            } else if (data.error === 'not_verified' || data.error === 'verify_expired') {
                result.style.display = 'block';
                result.textContent = 'Verification expired. Please scan the QR again.';
            } else {
                result.style.display = 'block';
                result.textContent = 'Submission failed. Please try again.';
            }
        });
    })();
</script>
{% endblock %}
