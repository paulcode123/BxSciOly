{% extends 'layout.html' %}

{% block title %}Member Management - Admin{% endblock %}

{% block content %}
<div class="admin-page">
    <!-- Navigation Header -->
    <div class="admin-nav">
        <div class="nav-left">
            <a href="/admin/dashboard" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
            <h1><i class="fas fa-users"></i> Member Management</h1>
        </div>
        <div class="nav-right">
            <button class="btn-secondary" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content-container">
        <div class="panel search-panel">
            <div class="panel-header">
                <h2>Search Member</h2>
            </div>
            <div class="panel-body">
                <div class="search-wrapper">
                    <div class="autocomplete-container">
                        <input 
                            type="text" 
                            id="memberSearchInput" 
                            placeholder="Start typing a member's name..." 
                            autocomplete="off"
                            class="search-input"
                        >
                        <i class="fas fa-search search-icon"></i>
                        <div id="autocompleteDropdown" class="autocomplete-dropdown"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Member Details Panel -->
        <div id="memberDetailsPanel" class="panel" style="display: none;">
            <div class="panel-header">
                <h2 id="memberDetailsTitle">Member Details</h2>
                <button class="close-details-btn" onclick="closeMemberDetails()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="panel-body" id="memberDetailsContent">
                <!-- Member details will be loaded here -->
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let searchTimeout;
    let selectedMemberId = null;

    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('memberSearchInput');
        const dropdown = document.getElementById('autocompleteDropdown');

        searchInput.addEventListener('input', function() {
            const query = this.value.trim();
            
            clearTimeout(searchTimeout);
            
            if (query.length < 2) {
                dropdown.style.display = 'none';
                return;
            }

            searchTimeout = setTimeout(() => {
                searchMembers(query);
            }, 300);
        });

        searchInput.addEventListener('focus', function() {
            if (this.value.trim().length >= 2) {
                searchMembers(this.value.trim());
            }
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.autocomplete-container')) {
                dropdown.style.display = 'none';
            }
        });
    });

    async function searchMembers(query) {
        try {
            const adminId = sessionStorage.getItem('adminId');
            const response = await fetch(`/api/admin/members/search?q=${encodeURIComponent(query)}`, {
                headers: { 'X-Admin-ID': adminId ? adminId : '' }
            });

            if (!response.ok) {
                throw new Error('Search failed');
            }

            const results = await response.json();
            displayAutocompleteResults(results);
        } catch (error) {
            console.error('Error searching members:', error);
        }
    }

    function displayAutocompleteResults(results) {
        const dropdown = document.getElementById('autocompleteDropdown');
        
        if (results.length === 0) {
            dropdown.innerHTML = '<div class="autocomplete-item"><div class="autocomplete-item-name">No members found</div></div>';
            dropdown.style.display = 'block';
            return;
        }

        dropdown.innerHTML = results.map(member => `
            <div class="autocomplete-item" onclick="selectMember('${member.id}', '${member.displayName.replace(/'/g, "\\'")}')">
                <div class="autocomplete-item-name">${escapeHtml(member.displayName)}</div>
                <div class="autocomplete-item-email">${escapeHtml(member.doeEmail)}</div>
            </div>
        `).join('');

        dropdown.style.display = 'block';
    }

    function selectMember(memberId, memberName) {
        selectedMemberId = memberId;
        document.getElementById('memberSearchInput').value = memberName;
        document.getElementById('autocompleteDropdown').style.display = 'none';
        loadMemberDetails(memberId);
    }

    async function loadMemberDetails(memberId) {
        const panel = document.getElementById('memberDetailsPanel');
        const content = document.getElementById('memberDetailsContent');
        
        panel.style.display = 'block';
        content.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading member details...</p></div>';

        try {
            const adminId = sessionStorage.getItem('adminId');
            
            // Fetch member details and competition data (same as competitions.html)
            const [memberDetailsResponse, competitionsResponse, membersResponse] = await Promise.all([
                fetch(`/api/admin/members/${memberId}/full`, {
                    headers: { 'X-Admin-ID': adminId ? adminId : '' }
                }),
                fetch('/api/Competitions'),
                fetch('/api/Members')
            ]);

            if (!memberDetailsResponse.ok) {
                throw new Error('Failed to load member details');
            }

            const data = await memberDetailsResponse.json();
            const competitionsData = await competitionsResponse.json();
            const membersData = await membersResponse.json();
            
            // Process competition results using the same logic as competitions.html
            data.competitionPlacements = processCompetitionResults(memberId, data.basicInfo, competitionsData, membersData);
            
            console.log('Member data received:', data);
            console.log('Competition placements:', data.competitionPlacements);
            displayMemberDetails(data);
        } catch (error) {
            console.error('Error loading member details:', error);
            content.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Failed to load member details. Please try again.</p></div>';
        }
    }
    
    // Process competition results - same logic as competitions.html
    function processCompetitionResults(memberId, memberInfo, competitionsResponse, membersResponse) {
        const results = [];
        
        // Normalize competitions into array
        const competitionsArray = Array.isArray(competitionsResponse) ? competitionsResponse : Object.values(competitionsResponse || {});
        const competitionsData = competitionsArray.map(item => {
            if (item && typeof item === 'object') {
                const entries = Object.entries(item);
                if (entries.length === 1) {
                    const [id, data] = entries[0];
                    return { ...(data || {}), id };
                }
            }
            return item;
        }).filter(Boolean);
        
        // Build members map id -> "First Last"
        const membersMap = {};
        const membersArray = Array.isArray(membersResponse) ? membersResponse : Object.values(membersResponse || {});
        membersArray.forEach(entry => {
            const entries = Object.entries(entry || {});
            if (entries.length === 1) {
                const [id, data] = entries[0];
                if (data) {
                    const first = data.firstName || '';
                    const last = data.lastName || '';
                    const full = `${first} ${last}`.trim() || (data.doeEmail || id);
                    membersMap[id] = full;
                }
            }
        });
        
        // Get user full name (normalized)
        const userFullName = `${(memberInfo.firstName || '').trim()} ${(memberInfo.lastName || '').trim()}`.trim().toLowerCase().replace(/\s+/g, ' ');
        
        // Helper to normalize strings
        const norm = s => (s || '').toString().trim().toLowerCase().replace(/\s+/g, ' ');
        
        // Process each competition
        competitionsData.forEach(competition => {
            if (!competition.teamPlacement) return;
            const resultsArray = (competition.results && Array.isArray(competition.results.eventResults)) ? competition.results.eventResults : [];
            
            // Collect all participations for the current user (by id OR full name)
            const userParticipations = competition.teamPlacement.filter(placement => {
                const participants = placement.participants || [];
                if (participants.includes(memberId)) return true;
                const lowerNames = participants.map(p => norm(membersMap[p] || p));
                return userFullName && lowerNames.includes(userFullName);
            });
            
            if (userParticipations.length === 0) return;
            
            userParticipations.forEach(p => {
                const targetEvent = norm(p.event);
                const team = p.team;
                const eventResult = resultsArray.find(r => norm(r.eventName) === targetEvent && r.team === team);
                const placement = eventResult ? eventResult.placement : null;
                const outOf = eventResult ? eventResult.outOf : null;
                
                // Get partner names
                const participants = p.participants || [];
                const partners = [];
                for (const participantId of participants) {
                    if (participantId !== memberId) {
                        // Check if it's the same person by name
                        const participantName = norm(membersMap[participantId] || participantId);
                        if (participantName !== userFullName) {
                            partners.push(membersMap[participantId] || participantId);
                        }
                    }
                }
                
                results.push({
                    competitionName: competition.name,
                    competitionDate: competition.date,
                    event: p.event,
                    team: team,
                    placement: placement,
                    outOf: outOf,
                    partners: partners
                });
            });
        });
        
        return results;
    }

    function displayMemberDetails(data) {
        const content = document.getElementById('memberDetailsContent');
        const title = document.getElementById('memberDetailsTitle');
        
        title.textContent = `${data.basicInfo.firstName} ${data.basicInfo.lastName}`;
        
        let html = '';

        // Basic Information
        html += `
            <div class="member-section">
                <div class="section-title">
                    <i class="fas fa-user"></i>
                    Basic Information
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">Name</div>
                        <div class="info-value">${escapeHtml(data.basicInfo.firstName)} ${escapeHtml(data.basicInfo.lastName)}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">DOE Email</div>
                        <div class="info-value">${escapeHtml(data.basicInfo.doeEmail || 'N/A')}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">BXSCI Email</div>
                        <div class="info-value">${escapeHtml(data.basicInfo.bxsciEmail || 'N/A')}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Personal Email</div>
                        <div class="info-value">${escapeHtml(data.basicInfo.personalEmail || 'N/A')}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">BXSciOly ID</div>
                        <div class="info-value">${escapeHtml(data.basicInfo.bxsciolyID || 'N/A')}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Phone Number</div>
                        <div class="info-value">${escapeHtml(data.basicInfo.phoneNumber || 'N/A')}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Grade</div>
                        <div class="info-value">${escapeHtml(data.basicInfo.grade || 'N/A')}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Years on Team</div>
                        <div class="info-value">${data.basicInfo.yearsInTeam || 0}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Member Status</div>
                        <div class="info-value">${escapeHtml(data.basicInfo.memberStatus || 'N/A')}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">House</div>
                        <div class="info-value">${escapeHtml(data.basicInfo.house || 'N/A')}</div>
                    </div>
                </div>
            </div>
        `;

        // Event Selection Form
        if (data.eventSelectionForm) {
            html += `
                <div class="member-section">
                    <div class="section-title">
                        <i class="fas fa-clipboard-list"></i>
                        Event Selection Form Responses
                    </div>
                    <div class="info-grid">
                        <div class="info-item" style="grid-column: 1 / -1;">
                            <div class="info-label">Events Selected</div>
                            <div class="info-value">${escapeHtml(data.eventSelectionForm.eventsSelected || 'N/A')}</div>
                        </div>
                        <div class="info-item" style="grid-column: 1 / -1;">
                            <div class="info-label">Why Join Team</div>
                            <div class="text-content">${escapeHtml(data.eventSelectionForm.whyJoin || 'N/A')}</div>
                        </div>
                        <div class="info-item" style="grid-column: 1 / -1;">
                            <div class="info-label">Event Rankings & Explanations</div>
                            <div class="text-content">${escapeHtml(data.eventSelectionForm.eventRankings || 'N/A')}</div>
                        </div>
                        <div class="info-item" style="grid-column: 1 / -1;">
                            <div class="info-label">Qualifications</div>
                            <div class="text-content">${data.eventSelectionForm.qualifications && data.eventSelectionForm.qualifications.trim() ? escapeHtml(data.eventSelectionForm.qualifications) : 'N/A'}</div>
                        </div>
                        <div class="info-item" style="grid-column: 1 / -1;">
                            <div class="info-label">Additional Information</div>
                            <div class="text-content">${data.eventSelectionForm.additionalInfo && data.eventSelectionForm.additionalInfo.trim() ? escapeHtml(data.eventSelectionForm.additionalInfo) : 'N/A'}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Diagnostic Scores
        if (data.diagnosticScores && data.diagnosticScores.length > 0) {
            html += `
                <div class="member-section">
                    <div class="section-title">
                        <i class="fas fa-chart-line"></i>
                        Diagnostic Scores
                    </div>
                    <table class="attendance-table">
                        <thead>
                            <tr>
                                <th>Event</th>
                                <th>Score</th>
                                <th>Rank</th>
                                <th>Percentile</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.diagnosticScores.map(score => `
                                <tr>
                                    <td>${escapeHtml(score.event)}</td>
                                    <td>${score.score.toFixed(2)}</td>
                                    <td>${score.rank ? `${score.rank}${getOrdinalSuffix(score.rank)}` : 'N/A'}</td>
                                    <td>${score.percentile !== null && score.percentile !== undefined ? `${score.percentile.toFixed(2)}%` : 'N/A'}</td>
                                </tr>
                            `).join('')}

                    </table>

            `;
        }

        // Competition Results - Always show this section
        html += `
            <div class="member-section">
                <div class="section-title">
                    <i class="fas fa-trophy"></i>
                    Competition Results
                </div>
        `;
        
        if (data.competitionPlacements && data.competitionPlacements.length > 0) {
            // Sort by date (newest first), then by placement (best first)
            const sortedPlacements = [...data.competitionPlacements].sort((a, b) => {
                const dateA = parseCompetitionDate(a.competitionDate);
                const dateB = parseCompetitionDate(b.competitionDate);
                if (dateB - dateA !== 0) return dateB - dateA;
                const placementA = a.placement || 9999;
                const placementB = b.placement || 9999;
                return placementA - placementB;
            });
            
            // Count medals
            const medals = {
                gold: sortedPlacements.filter(p => p.placement === 1).length,
                silver: sortedPlacements.filter(p => p.placement === 2).length,
                bronze: sortedPlacements.filter(p => p.placement === 3).length
            };
            
            html += `
                <div class="medal-summary">
                    <div class="medal-item">
                        <div class="medal gold">
                            <i class="fas fa-medal"></i>
                        </div>
                        <span>${medals.gold}</span>
                    </div>
                    <div class="medal-item">
                        <div class="medal silver">
                            <i class="fas fa-medal"></i>
                        </div>
                        <span>${medals.silver}</span>
                    </div>
                    <div class="medal-item">
                        <div class="medal bronze">
                            <i class="fas fa-medal"></i>
                        </div>
                        <span>${medals.bronze}</span>
                    </div>
                </div>
                
                <div class="results-list">
                    ${sortedPlacements.map(placement => {
                        const hasMedal = placement.placement && placement.placement <= 3;
                        const medalType = placement.placement === 1 ? 'gold' : placement.placement === 2 ? 'silver' : placement.placement === 3 ? 'bronze' : '';
                        const formattedDate = formatCompetitionDate(placement.competitionDate);
                        
                        return `
                            <div class="result-item">
                                ${hasMedal ? `
                                    <div class="result-medal result-${medalType}">
                                        <i class="fas fa-medal"></i>
                                    </div>
                                ` : '<div class="result-medal"></div>'}
                                
                                <div class="result-info">
                                    <div class="result-competition">${escapeHtml(placement.competitionName || 'N/A')}</div>
                                    <div class="result-event">
                                        ${escapeHtml(placement.event || 'N/A')} 
                                        <span class="team-badge">Team ${escapeHtml(placement.team || '?')}</span>
                                    </div>
                                    ${placement.partners && placement.partners.length > 0 ? `
                                        <div class="result-partners">
                                            <i class="fas fa-user-friends"></i> ${placement.partners.map(p => escapeHtml(p)).join(', ')}
                                        </div>
                                    ` : ''}
                                    <div class="result-date">${formattedDate}</div>
                                </div>
                                
                                <div class="result-placement">
                                    ${placement.placement ? `
                                        <div class="result-placement-number">
                                            ${placement.placement}<span class="result-placement-suffix">${getOrdinalSuffix(placement.placement)}</span>
                                        </div>
                                        ${placement.outOf ? `<div class="result-outof">out of ${placement.outOf}</div>` : ''}
                                    ` : '<div class="result-placement-number">—</div>'}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        } else {
            html += `
                <div class="empty-state">
                    <i class="fas fa-trophy"></i>
                    <p>No competition results recorded yet.</p>
                </div>
            `;
        }
        
        html += `</div>`;

        // Events & Attendance
        if (data.events && data.events.length > 0) {
            html += `
                <div class="member-section">
                    <div class="section-title">
                        <i class="fas fa-calendar-check"></i>
                        Events & Attendance
                    </div>
            `;

            data.events.forEach(event => {
                const isBuildEvent = event.attendance && event.attendance.type === 'build';
                html += `
                    <div class="event-card">
                        <div class="event-card-header">
                            <div class="event-name">${escapeHtml(event.eventName)}</div>
                            <span class="event-type-badge event-type-${isBuildEvent ? 'build' : 'non-build'}">
                                ${isBuildEvent ? 'Build Event' : 'Non-Build Event'}
                            </span>
                        </div>
                `;

                if (!event.attendance) {
                    html += `<p style="color: #64748b; padding: 1rem;">No attendance data available</p>`;
                } else if (isBuildEvent && event.attendance.weeklyData) {
                    html += `
                        <table class="attendance-table">
                            <thead>
                                <tr>
                                    <th>Week</th>
                                    <th>Build Meetings Attended</th>
                                    <th>Excused Absences</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${Object.entries(event.attendance.weeklyData).map(([week, data]) => `
                                    <tr>
                                        <td>${escapeHtml(week)}</td>
                                        <td>${data.buildMeetings}</td>
                                        <td>
                                            ${data.excused && data.excused.length > 0 
                                                ? data.excused.map(exc => `<div>${formatDate(exc.date)}: ${escapeHtml(exc.reason)}</div>`).join('')
                                                : 'None'}
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                } else if (event.attendance && event.attendance.meetings) {
                    if (event.attendance.meetings.length === 0) {
                        html += `<p style="color: #64748b; padding: 1rem;">No meetings recorded yet</p>`;
                    } else {
                        html += `
                            <table class="attendance-table">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Status</th>
                                        <th>Excuse/Notes</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${event.attendance.meetings.map(meeting => `
                                        <tr>
                                            <td>${formatDate(meeting.date)}</td>
                                            <td>
                                                <span class="status-badge status-${meeting.status}">
                                                    ${meeting.status === 'present' ? 'Present' : meeting.status === 'excused' ? 'Excused' : 'Unexcused'}
                                                </span>
                                            </td>
                                            <td>
                                                ${meeting.excuse ? escapeHtml(meeting.excuse) : (meeting.status === 'present' ? '—' : 'No excuse provided')}
                                                ${meeting.adminComments ? `<br><small style="color: #64748b;">Admin: ${escapeHtml(meeting.adminComments)}</small>` : ''}
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `;
                    }
                } else if (event.attendance && event.attendance.type === 'build' && (!event.attendance.weeklyData || Object.keys(event.attendance.weeklyData).length === 0)) {
                    html += `<p style="color: #64748b; padding: 1rem;">No build meetings recorded yet</p>`;
                } else {
                    html += `<p style="color: #64748b; padding: 1rem;">No attendance data available</p>`;
                }

                html += `</div>`;
            });

            html += `</div>`;
        }

        // Mason Invitational
        if (data.masonInvitational) {
            html += `
                <div class="member-section">
                    <div class="section-title">
                        <i class="fas fa-medal"></i>
                        Mason Invitational 2026
                    </div>
            `;

            if (data.masonInvitational.partners && Object.keys(data.masonInvitational.partners).length > 0) {
                html += `
                    <div style="margin-bottom: 1.5rem;">
                        <h3 style="font-size: 1rem; font-weight: 600; color: #475569; margin-bottom: 1rem;">Partners by Event</h3>
                        <ul class="partner-list">
                            ${Object.entries(data.masonInvitational.partners).map(([event, partners]) => {
                                // Get partner feedback for this event
                                const eventPartnerFeedback = data.masonInvitational.partnerFeedback && data.masonInvitational.partnerFeedback[event] 
                                    ? data.masonInvitational.partnerFeedback[event] 
                                    : {};
                                
                                // Collect all partners (from partners list + feedback list)
                                const allPartnersSet = new Set(partners || []);
                                if (eventPartnerFeedback) {
                                    Object.keys(eventPartnerFeedback).forEach(p => allPartnersSet.add(p));
                                }
                                const allPartners = Array.from(allPartnersSet);
                                
                                return `
                                <li class="partner-item">
                                    <div class="partner-name">${escapeHtml(event)}</div>
                                    <div style="margin-bottom: 0.75rem;">
                                        <strong>Partners:</strong> ${partners.map(p => escapeHtml(p)).join(', ') || 'None'}
                                    </div>
                                    ${allPartners.length > 0 ? `
                                        <div style="margin-top: 1rem;">
                                            <strong style="color: #475569; font-size: 0.9rem;">Feedback from Partners:</strong>
                                            <div style="color: #64748b; font-size: 0.85rem; margin-top: 0.25rem; margin-bottom: 0.75rem;">
                                                What each partner said about working with this member
                                            </div>
                                            ${allPartners.map(partnerName => {
                                                const feedback = eventPartnerFeedback[partnerName];
                                                const isOfficialPartner = partners.includes(partnerName);
                                                if (feedback && feedback.partnershipRating) {
                                                    return `
                                                        <div style="margin-top: 0.75rem; padding: 0.75rem; background: #f8fafc; border-radius: 6px; border-left: 3px solid #667eea;">
                                                            <div style="font-weight: 600; color: #1e293b; margin-bottom: 0.5rem;">
                                                                ${escapeHtml(partnerName)}${isOfficialPartner ? '' : ' (feedback only)'}'s Feedback:
                                                            </div>
                                                            <div class="text-content" style="margin-top: 0.5rem; font-size: 0.9rem;">
                                                                ${escapeHtml(feedback.partnershipRating)}
                                                            </div>
                                                        </div>
                                                    `;
                                                } else {
                                                    return `
                                                        <div style="margin-top: 0.75rem; padding: 0.75rem; background: #f8fafc; border-radius: 6px; border-left: 3px solid #cbd5e1;">
                                                            <div style="font-weight: 600; color: #64748b; margin-bottom: 0.5rem;">
                                                                ${escapeHtml(partnerName)}:
                                                            </div>
                                                            <div style="color: #94a3b8; font-style: italic; font-size: 0.9rem;">
                                                                Did not submit feedback form
                                                            </div>
                                                        </div>
                                                    `;
                                                }
                                            }).join('')}
                                        </div>
                                    ` : ''}
                                </li>
                            `;
                            }).join('')}
                        </ul>
                    </div>
                `;
            }

            if (data.masonInvitational.memberFeedback) {
                const feedback = data.masonInvitational.memberFeedback;
                html += `
                    <div>
                        <h3 style="font-size: 1rem; font-weight: 600; color: #475569; margin-bottom: 1rem;">Member Feedback</h3>
                        <div class="info-grid">
                            <div class="info-item" style="grid-column: 1 / -1;">
                                <div class="info-label">Events Competed In</div>
                                <div class="info-value">${escapeHtml(feedback.eventsCompeted || 'N/A')}</div>

                            <div class="info-item" style="grid-column: 1 / -1;">
                                <div class="info-label">Events Not Competed In</div>
                                <div class="text-content">${escapeHtml(feedback.eventsNotCompeted || 'N/A')}</div>
                            </div>
                            <div class="info-item" style="grid-column: 1 / -1;">
                                <div class="info-label">Exam Difficulty</div>
                                <div class="text-content">${escapeHtml(feedback.examDifficulty || 'N/A')}</div>
                            </div>
                            <div class="info-item" style="grid-column: 1 / -1;">
                                <div class="info-label">Partnerships</div>
                                <div class="text-content">${escapeHtml(feedback.partnerships || 'N/A')}</div>
                            </div>
                            <div class="info-item" style="grid-column: 1 / -1;">
                                <div class="info-label">What Went Well</div>
                                <div class="text-content">${escapeHtml(feedback.whatWentWell || 'N/A')}</div>
                            </div>
                            <div class="info-item" style="grid-column: 1 / -1;">
                                <div class="info-label">Road to Improvement</div>
                                <div class="text-content">${escapeHtml(feedback.roadToImprovement || 'N/A')}</div>
                            </div>
                            <div class="info-item" style="grid-column: 1 / -1;">
                                <div class="info-label">Primary Board Feedback</div>
                                <div class="text-content">${escapeHtml(feedback.primaryBoardFeedback || 'N/A')}</div>
                            </div>
                            <div class="info-item" style="grid-column: 1 / -1;">
                                <div class="info-label">Event Manager/Subject Director Feedback</div>
                                <div class="text-content">${escapeHtml(feedback.emSdFeedback || 'N/A')}</div>
                            </div>
                            <div class="info-item" style="grid-column: 1 / -1;">
                                <div class="info-label">Other Comments</div>
                                <div class="text-content">${escapeHtml(feedback.otherComments || 'N/A')}</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            html += `</div>`;
        }

        content.innerHTML = html;
        
        // Scroll to top of panel
        document.getElementById('memberDetailsPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function closeMemberDetails() {
        document.getElementById('memberDetailsPanel').style.display = 'none';
        document.getElementById('memberSearchInput').value = '';
        selectedMemberId = null;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatDate(dateStr) {
        if (!dateStr) return 'N/A';
        try {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        } catch (e) {
            return dateStr;
        }
    }
    
    function parseCompetitionDate(value) {
        if (!value) return new Date(0);
        if (value instanceof Date) return value;
        
        // Handle Firestore timestamp objects
        if (typeof value === 'object') {
            if (typeof value._seconds === 'number') {
                return new Date(value._seconds * 1000);
            }
            if (typeof value.seconds === 'number') {
                return new Date(value.seconds * 1000);
            }
            if (value.$date) {
                return new Date(value.$date);
            }
        }
        
        // Try parsing as string or number
        const parsed = new Date(value);
        return isNaN(parsed) ? new Date(0) : parsed;
    }
    
    function formatCompetitionDate(value) {
        const date = parseCompetitionDate(value);
        if (date.getTime() === 0) return '—';
        
        return date.toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
        });
    }

    function getOrdinalSuffix(num) {
        const j = num % 10;
        const k = num % 100;
        if (j === 1 && k !== 11) return 'st';
        if (j === 2 && k !== 12) return 'nd';
        if (j === 3 && k !== 13) return 'rd';
        return 'th';
    }

    function logout() {
        if (confirm('Are you sure you want to logout?')) {
            sessionStorage.removeItem('adminId');
            sessionStorage.removeItem('adminRole');
            sessionStorage.removeItem('adminPermissions');
            sessionStorage.removeItem('adminUserInfo');
            window.location.href = '/admin/login';
        }
    }
</script>
